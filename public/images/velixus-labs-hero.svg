<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 540" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hero-accent" x1="120" y1="80" x2="420" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8FFB0" />
      <stop offset="0.45" stop-color="#B8FF2C" />
      <stop offset="1" stop-color="#5BC400" />
    </linearGradient>
    <linearGradient id="hero-core" x1="270" y1="180" x2="270" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101820" />
      <stop offset="1" stop-color="#050505" />
    </linearGradient>
    <radialGradient id="hero-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 270) rotate(90) scale(220)">
      <stop stop-color="#B8FF2C" stop-opacity="0.22" />
      <stop offset="0.55" stop-color="#B8FF2C" stop-opacity="0.06" />
      <stop offset="1" stop-color="#B8FF2C" stop-opacity="0" />
    </radialGradient>
    <filter id="hero-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="hero-node-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="270" cy="270" r="220" fill="url(#hero-glow)" filter="url(#hero-blur)" />

  <g opacity="0.14" stroke="#FFFFFF" stroke-width="1">
